    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body{
            background:#0b0b0b;
            font-family:Arial, sans-serif;
            color: #fff;
            padding-bottom: 80px;
        }

        header {
            background: linear-gradient(90deg, #111, #1a001a);
            padding: 20px 15px;
            text-align: center;
            border-bottom: 3px solid #ff00aa;
            position: relative;
        }
        header h1 {
            color: #ff00aa;
            text-shadow: 0 0 15px #ff00aa;
            font-size: 2.3em;
        }
        header p {
            color: #ff88cc;
        }

        .live-counter {
            position: absolute;
            top: 20px;
            right: 15px;
            background: #1a001a;
            border: 2px solid #ff00aa;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 14px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .live-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00ff00;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
            gap:25px;
            padding: 30px 20px;
        }

        .card{
            background:#111;
            border:2px solid #ff00aa;
            border-radius:18px;
            overflow:hidden;
            box-shadow:0 0 15px #ff00aa33;
            transition: all 0.4s ease;
            opacity: 0.85;
            transform: translateY(20px);
        }
        .card.visible {
            opacity: 1;
            transform: translateY(0);
            box-shadow: 0 0 25px #ff00ff88;
        }
        .card:hover{
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 0 35px #ff00ff;
        }

        .card img{
            width:100%;
            height:180px;
            object-fit:cover;
        }

        .card h3{
            color:#ff00ff;
            text-align:center;
            margin:15px 0 5px;
            text-shadow: 0 0 10px #ff00ff;
        }

        .card p{
            color:#ddd;
            text-align:center;
        }

        .card a{
            display:block;
            margin:18px;
            text-align:center;
            padding:14px;
            text-decoration:none;
            color:#fff;
            border-radius:50px;
            font-weight:bold;
            background: linear-gradient(90deg, #ff00ff, #ff0088, #ff00cc);
            background-size: 400%;
            animation: pinkrgb 4s linear infinite;
        }

        @keyframes pinkrgb {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Telegram Button */
        .telegram-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #ff00aa;
            color: white;
            width: 68px;
            height: 68px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 0 20px #ff00aa;
            z-index: 1000;
            transition: all 0.3s;
            text-decoration: none;
        }
        .telegram-btn:hover {
            transform: scale(1.2) rotate(10deg);
        }

        footer {
            text-align: center;
            padding: 25px;
            background: #111;
            border-top: 2px solid #ff00aa;
            margin-top: 40px;
        }
    </style>
</head>

<script>
    let currentAudio = null;

    function playDownloadSound(e) {

    // Live Counter
    let online = 248;
    let total = 18472;
    function updateCounter() {
        online = Math.floor(Math.random() * 90) + 210;
        total += Math.floor(Math.random() * 8) + 4;
        document.getElementById('online').textContent = online;
        document.getElementById('total').textContent = total.toLocaleString();
    }
    setInterval(updateCounter, 7000);
    updateCounter();

    // Scroll Animation
    const cards = document.querySelectorAll('.card');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.15 });
    cards.forEach(card => observer.observe(card));
</script>
